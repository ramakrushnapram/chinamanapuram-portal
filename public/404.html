<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Chinamanapuram Portal</title>
  <script>
    // SPA redirect: send all 404s back to index.html with the path encoded
    var path = window.location.pathname + window.location.search;
    sessionStorage.setItem('redirect', path);
    window.location.replace('/');
  </script>
</head>
<body></body>
</html>
